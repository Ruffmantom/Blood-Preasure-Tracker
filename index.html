<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="apple-mobile-web-app-status-bar" content="#db4938" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="./utils/manifest.json" />
  <!-- ios support -->
  <link rel="apple-touch-icon" href="./assets/images/mybp-app-logo.png" />
  <link rel="icon" type="image/x-icon" href="./assets/icons/mybp-app-logo-96x96.ico" />
  <link rel="stylesheet" href="./styles/other.css">
  <title>BP Tracker</title>
  <!-- jquery -->
  <script src="./js/libraries/jquery.js"></script>
  <!-- tailwind -->
  <!-- <script src="./js/libraries/tailwind.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body id="main_body" class="flex flex-col gap-0 h-screen relative">
  <!-- overlay -->
   <div id="overlay" class="absolute bg-zinc-950/15 w-full h-full z-10 backdrop-blur-xs"></div>
  <!-- modal area -->
  <div id="add-bp-entry-modal" class="pb-12 flex flex-col absolute z-20 w-full bottom-0 left-0 gap-3 p-3 rounded-t-md bg-zinc-50">
    <div class="flex justify-between items-center">
      <p>Add Entry</p>
      <button id="close-add-entry-btn" class="p-3 rounded-sm">
      </button>
    </div>

    <div class="flex flex-col gap-1">
      <label for="blood-pressure-input">Systolic (Top) / Diastolic (Bottom)</label>
      <input class="p-3 bg-zinc-100 rounded-sm outline-none" type="text" id="blood-pressure-input"
        name="blood-pressure-input" placeholder="120/70...">
    </div>
    <div class="flex flex-col gap-1">
      <label for="blood-pressure-input">Pulse Rate</label>
      <input class="p-3 bg-zinc-100 rounded-sm outline-none" type="text" id="blood-pressure-pulse"
        name="blood-pressure-pulse" placeholder="54...">
    </div>
    <div class="flex flex-col gap-1">
      <label for="blood-pressure-notes">Pulse Rate</label>
      <textarea class="p-3 bg-zinc-100 rounded-sm outline-none max-w-full max-h-28" name="blood-pressure-notes"
        id="blood-pressure-notes" placeholder="notes..."></textarea>
    </div>

    <button class="p-3 bg-blue-600 text-white w-full text-center rounded-sm">Add Entry</button>
  </div>




  <!-- header -->
  <div id="header-section" class="p-4 pt-12">
    <p class="text-lg font-medium" id="header-title">Blood Pressure Tracker</p>
  </div>

  <!-- main content section -->
  <div id="content-section" class="p-4 flex flex-col grow-1">

    <p class="text-center">No data found</p>
    <p class="text-center">You have not added any entries yet</p>

  </div>

  <!-- footer section -->
  <div id="footer-section" class="p-4 pb-6 flex flex-col gap-3">
    <div id="footer-top" class="flex items-center justify-center">
      <button id="footer-add-btn"
        class="rounded-full w-max p-3 flex items-center justify-center bg-blue-600 fill-white"></button>
    </div>
    <div class="footer-bottom flex gap-12 justify-center items-center">
      <button id="footer-bp-tracker-btn"
        class="w-10 h-10 p-0 flex items-center justify-center border-b-2 border-blue-600 fill-blue-600"></button>
      <button id="footer-cabinet-btn"
        class="w-10 h-10 p-0 flex items-center justify-center border-b-2 border-zinc-50/0"></button>
      <button id="footer-settings-btn"
        class="w-10 h-10 p-0 flex items-center justify-center border-b-2 border-zinc-50/0"></button>
    </div>
  </div>



  <!-- service worker -->
  <script src="./utils/main.js"></script>

  <!-- script links -->
  <script src="./js/libraries/icons.js"></script>
  <script src="./js/helpers.js"></script>
  <script src="./js/createHtml.js"></script>
  <script src="./js/index.js"></script>
  <script src="./js/app.js"></script>
</body>

</html>
